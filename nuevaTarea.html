<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Tarea</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Encabezado -->
    <header class="header">
        <button class="back-btn">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1>Nueva Tarea</h1>
    </header>

    <!-- Formulario -->
    <div class="form-container">

        <div class="title-section">
            <label>Título:</label>
            <input type="text">
        </div>

        <div class="description-section">
            <label>Descripción:</label>
            <textarea></textarea>
        </div>

        <div class="field-row">
            <label>Fecha:</label>
            <input type="date">
        </div>

        <div class="field-row">
            <label>Hora:</label>
            <input type="time">
        </div>

        <div class="field-row">
            <label>Prioridad:</label>
            <select>
                <option>Alta</option>
                <option>Media</option>
                <option>Baja</option>
            </select>
        </div>

        <div class="field-row">
            <label>Asignado:</label>
            <select>
                <option>Usuario</option>
                <option>Administrador</option>
                <option>Invitado</option>
            </select>
        </div>

        <div class="field-row">
            <label>Completada:</label>
            <select>
                <option>Sí</option>
                <option>No</option>
            </select>
        </div>

        <button class="btn-create">
            Crear tarea
        </button>

    </div>

</div>

</body>
</html>
