<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio de Sesión</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.caja{
    width:340px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    position:relative;
}

.encabezado{
    height:140px;
    background:url("https://i.pinimg.com/736x/6b/be/66/6bbe66012805769a6076c9d74da532aa.jpg")
    center/cover no-repeat;
}

.avatar{
    width:95px;
    height:95px;
    border-radius:50%;
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    border:5px solid white;
    overflow:hidden;
}

.avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.formulario{
    padding:70px 20px 25px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.login{background:#6d28d9;}
.reg{background:#8b5cf6;}

a{
    display:block;
    margin-top:10px;
    font-size:13px;
    color:#6d28d9;
    cursor:pointer;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="caja">

    <div class="encabezado"></div>

    <div class="avatar">
        <img src="https://previews.123rf.com/images/faysalfarhan/faysalfarhan1501/faysalfarhan150100938/35664975-calendar-icon-purple-glossy-round-button.jpg">
    </div>

    <div class="formulario">

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">

        <button class="login" onclick="login()">Iniciar sesión</button>
        <button class="reg" onclick="registrar()">Registrarse</button>

        <a onclick="olvidar()">¿Olvidaste tu contraseña?</a>

    </div>

</div>

<script>
function login(){
    let u = document.getElementById("usuario").value;
    let p = document.getElementById("pass").value;

    if(u === "" && p === ""){
        window.location.href = "nuevaTarea.html";
    } else {
        alert("Datos incorrectos");
    }
}

function registrar(){
    window.location.href = "registro.html";
}

function olvidar(){
    window.location.href = "recuperar.html";
}
</script>

</body>
</html>
